server {
    listen 80;
    server_name _;

    # Gzip compression untuk performa
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json
               application/x-mpegurl application/vnd.apple.mpegurl;

    # ── Serve React SPA ────────────────────────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;

        # Cache static assets agresif
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── Health check endpoint nginx ─────────────────────────────────────────
    location /health {
        access_log off;
        return 200 '{"status":"ok","service":"live-web-app"}';
        add_header Content-Type application/json;
    }

    # ── Proxy /proxy/* → service proxy:3001 ────────────────────────────────
    # Semua request HLS/DASH yang butuh bypass CORS diteruskan ke proxy service
    location /proxy/ {
        # Hapus prefix /proxy/ sebelum diteruskan
        rewrite ^/proxy/(.*)$ /$1 break;

        proxy_pass http://proxy:3001/proxy/;
        proxy_http_version 1.1;

        proxy_set_header Host             $proxy_host;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;

        # Timeout untuk live stream (stream bisa lama)
        proxy_read_timeout    300s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    300s;

        # Buffer untuk streaming
        proxy_buffering off;

        # Teruskan CORS headers dari proxy service
        add_header Access-Control-Allow-Origin  * always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "*" always;
    }
}
